spring:
  application:
    name: figureshot-lab
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  ai:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${AI_MODEL:claude-sonnet-4-5}
  storage:
    local-dir: ${STORAGE_LOCAL_DIR:./uploads}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
