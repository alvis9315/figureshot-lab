openapi: 3.1.0
info:
  title: FigureShot Lab API
  version: 0.1.0
  description: 契約隨實作同步;目前僅 health。
servers:
  - url: http://localhost:8080/api/v1
paths:
  /health:
    get:
      summary: Service health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
