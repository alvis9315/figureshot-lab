services:
  postgres:
    image: postgres:16
    container_name: figureshot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-figureshot}
      POSTGRES_USER: ${POSTGRES_USER:-figureshot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - figureshot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-figureshot}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  figureshot-pgdata:
